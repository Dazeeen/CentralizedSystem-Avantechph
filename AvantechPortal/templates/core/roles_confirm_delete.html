{% extends 'base_app.html' %}

{% block title %}Avantech Portal | Delete Role{% endblock %}
{% block page_heading %}Roles{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm">
    <div class="card-body p-4 p-lg-5">
        <h2 class="h4 mb-3">Delete Role</h2>
        <p>Are you sure you want to delete <strong>{{ role.name }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-danger">Delete</button>
                <a href="{% url 'roles_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
