<div class="p-3 p-md-4">
	<h3 class="h5 mb-3">Verify Email</h3>
	<p class="text-secondary small mb-3">Enter the email linked to your account. We will send a 6-digit verification code.</p>

	{% if form.non_field_errors %}
		<div class="alert alert-danger">{{ form.non_field_errors }}</div>
	{% endif %}

	<form method="post" action="{% url 'send_email_verification' %}" data-settings-modal-form>
		{% csrf_token %}
		<input type="hidden" name="modal" value="1">
		<div class="mb-3{% if form.email.errors %} field-has-error{% endif %}">
			<label for="id_email" class="form-label">Email</label>
			{{ form.email }}
			{% if form.email.errors %}<div class="text-danger small mt-1">{{ form.email.errors|striptags }}</div>{% endif %}
		</div>
		<div class="d-flex gap-2 mt-3">
			<button type="submit" class="btn btn-success">Send Verification Code</button>
			<button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
		</div>
	</form>
</div>
