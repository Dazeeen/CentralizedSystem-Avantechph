{% extends 'base.html' %}

{% block title %}Avantech Portal | Password Updated{% endblock %}

{% block content %}
<section class="login-section d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="card border-0 shadow-lg rounded-4">
                    <div class="card-body p-4 p-md-5 text-center">
                        <h1 class="h4 fw-bold mb-3">Password Updated</h1>
                        <p class="text-secondary">Your password has been changed successfully.</p>
                        <a href="{% url 'login' %}" class="btn btn-success mt-2">Sign In</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
