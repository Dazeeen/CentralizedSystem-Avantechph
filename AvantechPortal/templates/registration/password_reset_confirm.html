{% extends 'base.html' %}

{% block title %}Avantech Portal | Set New Password{% endblock %}

{% block content %}
<section class="login-section d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="card border-0 shadow-lg rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h4 fw-bold mb-3 text-center">Set a New Password</h1>
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="id_new_password1" class="form-label">New password</label>
                                {{ form.new_password1 }}
                            </div>
                            <div class="mb-4">
                                <label for="id_new_password2" class="form-label">Confirm new password</label>
                                {{ form.new_password2 }}
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success btn-lg">Update Password</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
