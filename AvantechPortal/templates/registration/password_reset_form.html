{% extends 'base.html' %}

{% block title %}Avantech Portal | Password Reset{% endblock %}

{% block content %}
<section class="login-section d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="card border-0 shadow-lg rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h4 fw-bold mb-3 text-center">Reset Password</h1>
                        <p class="text-secondary text-center mb-4">Enter your account email and we will send a secure reset link.</p>

                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-4">
                                <label for="id_email" class="form-label">Email</label>
                                <input type="email" id="id_email" name="email" class="form-control" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success btn-lg">Send Reset Link</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
